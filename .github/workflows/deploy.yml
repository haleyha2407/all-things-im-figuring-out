name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The committed lockfile is generated on macOS and omits the Linux
      # native binaries (Rollup, Tailwind oxide, lightningcss) due to
      # npm/cli#4828 — so both `npm ci` and `npm install` skip them and the
      # build fails. Removing the lockfile forces a clean, platform-correct
      # resolution on the runner, which installs the Linux binaries.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
