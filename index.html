
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>All Things I'm Learning</title>
      <meta name="description" content="Explore a personal engineering blog where a software engineer shares insights on backend systems, AI, and debugging, fostering a community of learners." />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <!-- SPA fallback: decodes the redirect written by public/404.html back into
           a real route. Must run before the app script below. -->
      <script>
        (function (l) {
          if (l.search[1] === "/") {
            var decoded = l.search
              .slice(1)
              .split("&")
              .map(function (s) { return s.replace(/~and~/g, "&"); })
              .join("?");
            window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
          }
        })(window.location);
      </script>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
