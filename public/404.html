<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>All Things I'm Learning</title>
    <!--
      SPA fallback for GitHub Pages. Pages returns this file for any path that
      isn't a real file (e.g. /notes/some-slug on a refresh). It encodes the
      requested path into a query string and redirects to the app, where the
      shim in index.html restores the real URL.
      pathSegmentsToKeep = 1 keeps the "/all-things-im-figuring-out" repo segment.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
